name: Build Unsigned IPA
on: [push, workflow_dispatch]
jobs:
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "5.10"
      - name: Run core tests
        run: swift test

  build:
    runs-on: macos-15
    needs: core-tests
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app
      - name: Download iOS platform
        run: |
          # Retry logic for simulator connection issues
          for i in 1 2 3; do
            echo "Attempt $i to download iOS platform..."
            if xcodebuild -downloadPlatform iOS; then
              echo "Successfully downloaded iOS platform"
              exit 0
            fi
            echo "Attempt $i failed, waiting before retry..."
            sleep 10
          done
          echo "Failed to download iOS platform after 3 attempts, but continuing..."
          # Don't fail the build if platform download fails - it might already be installed
          exit 0
        continue-on-error: true
      - name: Generate build number
        run: |
          BUILD=$(git rev-list --count HEAD)
          echo "BUILD_NUMBER=$BUILD" >> $GITHUB_ENV
          echo "BUILD_NUMBER = $BUILD" > GGUFMyRepo/generated-build-number.xcconfig
      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -scheme GGUFMyRepo
      - name: Build archive
        run: |
          xcodebuild archive \
            -scheme GGUFMyRepo \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/GGUFMyRepo.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/GGUFMyRepo.xcarchive/Products/Applications/GGUFMyRepo.app Payload/
          zip -r GGUFMyRepo.ipa Payload/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GGUFMyRepo-unsigned-${{ env.BUILD_NUMBER }}
          path: GGUFMyRepo.ipa
