name: Build Unsigned IPA
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app
      - name: Download iOS platform
        run: xcodebuild -downloadPlatform iOS
      - name: Generate build number
        run: |
          BUILD=$(git rev-list --count HEAD)
          echo "BUILD_NUMBER=$BUILD" >> $GITHUB_ENV
          echo "BUILD_NUMBER = $BUILD" > GGUFMyRepo/generated-build-number.xcconfig
      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -scheme GGUFMyRepo
      - name: Build archive
        run: |
          xcodebuild archive \
            -scheme GGUFMyRepo \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/GGUFMyRepo.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES
      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/GGUFMyRepo.xcarchive/Products/Applications/GGUFMyRepo.app Payload/
          zip -r GGUFMyRepo.ipa Payload/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GGUFMyRepo-unsigned-${{ env.BUILD_NUMBER }}
          path: GGUFMyRepo.ipa
